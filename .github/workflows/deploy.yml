name: Tự động Build và Deploy lên VPS

# Kịch bản sẽ chạy mỗi khi có code mới đẩy lên nhánh master
on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Lấy code mới nhất
        uses: actions/checkout@v4

      - name: Đăng nhập vào Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build và Đẩy Image lên Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Đổi tên image theo chuẩn: username/tên-app:latest
          tags: ${{ secrets.DOCKER_USERNAME }}/eclass-app:latest

      - name: SSH vào VPS và Deploy bản mới
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/eclass

            # 1. Kéo file cấu hình mới nhất (docker-compose.yml, .env...) từ Github về VPS
            git pull origin master

            # 2. Kéo bản build mới nhất từ Docker Hub về (siêu nhanh)
            docker pull ${{ secrets.DOCKER_USERNAME }}/eclass-app:latest

            # 3. Ép Docker đập bỏ container cũ và chạy lại bằng image mới
            docker compose up -d --force-recreate app

            # 4. TỰ ĐỘNG DỌN RÁC (Xóa các image cũ lơ lửng, giải phóng ổ cứng)
            docker image prune -f