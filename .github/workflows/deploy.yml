name: Tự động Build và Deploy lên VPS

# Kịch bản sẽ chạy mỗi khi có code mới đẩy lên nhánh master
on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Lấy code mới nhất
        uses: actions/checkout@v4

      - name: Đăng nhập vào Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build và Đẩy Image lên Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Đổi tên image theo chuẩn: username/tên-app:latest
          tags: ${{ secrets.DOCKER_USERNAME }}/eclass-app:latest

      - name: SSH vào VPS và Deploy bản mới
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/eclass

            # 1. DỌN RÁC TRƯỚC: Xóa triệt để các image cũ không sử dụng để lấy chỗ trống
            docker image prune -a -f

            # 2. Kéo file cấu hình mới nhất (docker-compose.yml, .env...) từ Github về VPS
            git pull origin master

            # 3. Kéo bản build mới nhất từ Docker Hub về (lúc này ổ cứng đã có chỗ trống)
            docker pull ${{ secrets.DOCKER_USERNAME }}/eclass-app:latest

            # 4. Ép Docker đập bỏ container cũ và chạy lại bằng image mới
            docker compose up -d --force-recreate app

            # --- CHÈN LỆNH CHẠY SCRIPT VÀO ĐÂY ---
            # Đợi khoảng 5 giây để app và database khởi động xong hẳn
            sleep 5
            
            # 1. Copy file từ VPS chèn thẳng vào thư mục gốc (/app) của container
            docker compose cp clone-course.js app:/app/clone-course.js
            
            # 2. Chạy script đã được copy
            docker compose exec -T app node clone-course.js
            # ------------------------------------

            # 5. DỌN RÁC LẦN NỮA: Xóa luôn cái vỏ image vừa bị đập bỏ ở bước 4
            docker image prune -f