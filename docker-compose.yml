services:
  # --- DATABASE SERVICE ---
  postgres:
    image: postgres:15-alpine
    container_name: eclass_postgres
    restart: always
    environment:
      # Docker sẽ lấy giá trị từ file .env tương ứng
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - eclass_network

  # --- NEXT.JS APP SERVICE ---
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eclass_app
    restart: always
    ports:
      - "3000:3000"
    # File .env sẽ được nạp trực tiếp vào App
    env_file:
      - .env
    environment:
      # Ép App dùng DATABASE_URL đã khai báo trong .env
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      - postgres
    networks:
      - eclass_network

volumes:
  postgres_data:
    driver: local

networks:
  eclass_network:
    driver: bridge
